default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]

      - id: detect-secrets
        name: detect secrets
        entry: uv run detect-secrets-hook
        language: system
        types: [text]

      - id: yamllint
        name: yamllint
        entry: uv run yamllint
        language: system
        types: [yaml]

      - id: markdownlint
        name: markdownlint
        entry: uv run pymarkdown scan
        language: system
        types: [markdown]

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false

      - id: commitizen
        name: commitizen check
        entry: uv run cz check --commit-msg-file
        language: system
        stages: [commit-msg]
